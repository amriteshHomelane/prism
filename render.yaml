services:
  - type: web
    name: prism-django
    runtime: python
    rootDir: prism-django
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_prism"
    startCommand: "gunicorn prism.wsgi"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PRISM_ADMIN_EMAIL
        value: "pavithra.s@homelane.com"
